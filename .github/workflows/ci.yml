name: Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-west-1
  BACKEND_IMAGE_NAME: ai-backend
  OLLAMA_MODEL: qwen2.5:1.5b

jobs:
  backend-test:
    name: Backend Health Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        env:
          AWS_EC2_METADATA_DISABLED: "true"
        run: python -m py_compile main.py

      - name: Test FastAPI health endpoint
        env:
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_REGION: ${{ env.AWS_REGION }}
          OLLAMA_MODEL: ${{ env.OLLAMA_MODEL }}
        run: |
          python - <<'PY'
          from main import health

          assert health()["ok"] is True
          PY

  frontend-build:
    name: Frontend Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ai-ui
        run: npm ci

      - name: Build frontend
        working-directory: ai-ui
        env:
          CI: "false"
        run: npm run build

  sast:
    name: SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Bandit static analysis
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -r main.py aws-lambda-ec2-scheduler -f txt

  dast:
    name: DAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build backend image for DAST
        run: docker build -t ai-backend:dast .

      - name: Start backend container
        run: |
          docker run -d \
            --name ai-backend-dast \
            -p 8000:8000 \
            -e AWS_EC2_METADATA_DISABLED=true \
            -e AWS_REGION=${{ env.AWS_REGION }} \
            -e OLLAMA_MODEL=${{ env.OLLAMA_MODEL }} \
            -e OLLAMA_URL=http://127.0.0.1:11434 \
            ai-backend:dast

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs ai-backend-dast
          exit 1

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p zap-report
          docker run --rm \
            --network host \
            -v "$PWD/zap-report:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:8000 \
            -r zap-report.html \
            -I

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: zap-report/zap-report.html

      - name: Stop backend container
        if: always()
        run: docker rm -f ai-backend-dast || true

  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-build
      - sast
      - dast
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          DOCKERHUB_NAMESPACE="${DOCKERHUB_USERNAME,,}"
          IMAGE="$DOCKERHUB_NAMESPACE/${{ env.BACKEND_IMAGE_NAME }}"
          echo "Building $IMAGE:${{ github.sha }} and $IMAGE:latest"

          docker build \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .

      - name: Push commit image tag
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          DOCKERHUB_NAMESPACE="${DOCKERHUB_USERNAME,,}"
          IMAGE="$DOCKERHUB_NAMESPACE/${{ env.BACKEND_IMAGE_NAME }}"
          echo "Pushing $IMAGE:${{ github.sha }}"
          docker push "$IMAGE:${{ github.sha }}"

      - name: Push latest image tag
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          DOCKERHUB_NAMESPACE="${DOCKERHUB_USERNAME,,}"
          IMAGE="$DOCKERHUB_NAMESPACE/${{ env.BACKEND_IMAGE_NAME }}"
          echo "Pushing $IMAGE:latest"
          docker push "$IMAGE:latest"

  deploy:
    name: Deploy to EC2 with Ansible and SSM
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Ansible runtime
        run: |
          python -m pip install --upgrade pip
          pip install ansible boto3 botocore

      - name: Install Ansible collections
        working-directory: terraform-ai-infra/ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Show deployment targets
        working-directory: terraform-ai-infra/ansible
        run: ansible-inventory --graph

      - name: Pull and restart backend on EC2
        working-directory: terraform-ai-infra/ansible
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          DOCKERHUB_NAMESPACE="${DOCKERHUB_USERNAME,,}"
          BACKEND_IMAGE="$DOCKERHUB_NAMESPACE/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"

          ansible-playbook playbooks/deploy_backend_ssm.yml \
            -e "backend_image=$BACKEND_IMAGE" \
            -e "backend_container_name=ai-backend" \
            -e "ollama_model=${{ env.OLLAMA_MODEL }}" \
            -e "google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}"
