version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always # Production grade restart policy
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db # Persists data between restarts
    networks:
      - ai-network

  # Backend (FastAPI) Service
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ai_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Connects to MongoDB within the docker network using the service name
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=chat_db
      # Using host.docker.internal to access Ollama running natively on the Mac host
      - OLLAMA_URL=http://host.docker.internal:11434 
      # Include your Google Auth Client ID here for production validation
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - mongodb
    networks:
      - ai-network

  # Frontend (React) Service
  frontend:
    build: 
      context: ./ai-ui
      dockerfile: Dockerfile
    container_name: ai_frontend
    restart: always
    ports:
      - "3000:80" # Exposed on 3000 (standard for React), but hits Nginx 80 inside container
    networks:
      - ai-network

volumes:
  mongodb_data:

networks:
  ai-network:
    driver: bridge
