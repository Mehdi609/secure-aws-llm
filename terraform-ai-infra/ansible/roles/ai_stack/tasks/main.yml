---
- name: Install Docker
  ansible.builtin.yum:
    name: docker
    state: present

- name: Install pip for Docker SDK (Ansible docker modules)
  ansible.builtin.yum:
    name: python3-pip
    state: present

- name: Install Python Docker SDK on instance
  ansible.builtin.pip:
    name: docker>=6.0.0
    executable: pip3

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Pull frontend image
  community.docker.docker_image:
    name: "{{ frontend_image }}"
    source: pull

- name: Pull backend image
  community.docker.docker_image:
    name: "{{ backend_image }}"
    source: pull

- name: Run frontend container
  community.docker.docker_container:
    name: "{{ frontend_container_name }}"
    image: "{{ frontend_image }}"
    state: started
    restart_policy: unless-stopped
    published_ports:
      - "{{ frontend_port }}:{{ frontend_port }}"

- name: Run backend container
  community.docker.docker_container:
    name: "{{ backend_container_name }}"
    image: "{{ backend_image }}"
    state: started
    restart_policy: unless-stopped
    published_ports:
      - "{{ backend_port }}:{{ backend_port }}"

- name: Wait for frontend port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ frontend_port }}"
    timeout: 120

- name: Wait for backend port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ backend_port }}"
    timeout: 120

- name: Ensure nginx is installed
  ansible.builtin.yum:
    name: nginx
    state: present

- name: Deploy nginx reverse proxy for ALB
  ansible.builtin.template:
    src: nginx-ai.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
  notify: Restart nginx

- name: Enable nginx
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Flush handlers (apply nginx config before checks)
  ansible.builtin.meta: flush_handlers

- name: Verify /health via nginx
  ansible.builtin.uri:
    url: http://127.0.0.1/health
    return_content: true
  register: health_check
  failed_when: health_check.status != 200

- name: Show instance summary
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} ({{ instance_az | default('unknown AZ') }}) — Docker + nginx configured"
