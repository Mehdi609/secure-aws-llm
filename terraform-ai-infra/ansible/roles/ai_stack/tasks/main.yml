---
- name: Install Docker
  ansible.builtin.yum:
    name: docker
    state: present

- name: Install pip for Docker SDK (Ansible docker modules)
  ansible.builtin.yum:
    name: python3-pip
    state: present

- name: Install Python Docker SDK on instance
  ansible.builtin.pip:
    name: docker>=6.0.0
    executable: pip3


- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Login to Docker Hub when credentials are provided
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_token }}"
  when:
    - dockerhub_username is defined
    - dockerhub_username | length > 0
    - dockerhub_token is defined
    - dockerhub_token | length > 0

- name: Pull backend image
  community.docker.docker_image:
    name: "{{ backend_image }}"
    source: pull
    force_source: true

- name: Pull Ollama image
  community.docker.docker_image:
    name: ollama/ollama
    source: pull

- name: Create application network
  community.docker.docker_network:
    name: app-network

- name: Create Ollama volume
  community.docker.docker_volume:
    name: ollama-data


- name: Run Ollama container
  community.docker.docker_container:
    name: "{{ ollama_container_name }}"
    image: ollama/ollama
    state: started
    restart_policy: unless-stopped

    networks:
      - name: app-network

    volumes:
      - ollama-data:/root/.ollama

    published_ports:
      - "11434:11434"

- name: Wait for Ollama API
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 11434
    timeout: 300

- name: Pull Ollama model
  ansible.builtin.command:
    cmd: "docker exec {{ ollama_container_name }} ollama pull {{ ollama_model }}"
  register: ollama_model_pull
  changed_when: "'success' in ollama_model_pull.stdout | lower"

- name: Run backend container
  community.docker.docker_container:
    name: "{{ backend_container_name }}"
    image: "{{ backend_image }}"
    state: started
    recreate: true
    restart_policy: unless-stopped
    published_ports:
      - "{{ backend_port }}:{{ backend_port }}"
    networks:
      - name: app-network
    env:
      OLLAMA_URL: "{{ ollama_url }}"
      OLLAMA_MODEL: "{{ ollama_model }}"
      OLLAMA_NUM_CTX: "{{ ollama_num_ctx | default(2048) }}"
      OLLAMA_NUM_PREDICT: "{{ ollama_num_predict | default(256) }}"
      OLLAMA_NUM_THREAD: "{{ ollama_num_thread | default(2) }}"
      OLLAMA_TEMPERATURE: "{{ ollama_temperature | default(0.3) }}"
      OLLAMA_KEEP_ALIVE: "{{ ollama_keep_alive | default('30m') }}"
      AWS_REGION: "{{ aws_region }}"
      GOOGLE_CLIENT_ID: "{{ google_client_id | default('') }}"

- name: Wait for backend port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ backend_port }}"
    timeout: 120

- name: Ensure nginx is installed
  ansible.builtin.yum:
    name: nginx
    state: present

- name: Deploy nginx reverse proxy for ALB
  ansible.builtin.template:
    src: nginx-ai.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
  notify: Restart nginx

- name: Enable nginx
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Flush handlers (apply nginx config before checks)
  ansible.builtin.meta: flush_handlers

- name: Verify /health via nginx
  ansible.builtin.uri:
    url: http://127.0.0.1/health
    return_content: true
  register: health_check
  failed_when: health_check.status != 200

- name: Show instance summary
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} ({{ instance_az | default('unknown AZ') }}) — Docker + nginx configured"
